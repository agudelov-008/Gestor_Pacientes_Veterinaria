{% extends 'base.html' %}
{% block content %}
<div class="card shadow p-4 mx-auto" style="max-width: 600px;">
    <h3 class="text-primary"><i class="bi bi-plus-circle"></i> Registro de Mascota - PETS S.A.</h3>
    <hr>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Identificación Mascota</label>
            <input type="text" name="id_mascota" class="form-control" placeholder="Ej: M-101" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Nombre de la Mascota</label>
            <input type="text" name="nombre" class="form-control" placeholder="Nombre" required>
        </div>
        <div class="row mb-3">
            <div class="col">
                <label class="form-label">Raza</label>
                <input type="text" name="raza" class="form-control" placeholder="Raza" required>
            </div>
            <div class="col">
                <label class="form-label">Edad</label>
                <input type="number" name="edad" class="form-control" placeholder="Edad" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Peso (kg)</label>
            <input type="number" step="0.1" name="peso" class="form-control" placeholder="0.0" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label text-info fw-bold">Medicamentos (Mantén Ctrl para seleccionar varios):</label>
            <select name="medicamentos_seleccionados" class="form-select" multiple size="4" required>
                {% for m in medicamentos %}
                <option value="{{ m.id_med }}">{{ m.nombre }} ({{ m.dosis }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-4">
            <label class="form-label">Dueño (Cliente):</label>
            <select name="cedula_cliente" class="form-select" required>
                {% for c in clientes %}
                <option value="{{ c.cedula }}">{{ c.nombres }} {{ c.apellidos }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-primary w-100 shadow-sm">Finalizar Registro</button>
    </form>
</div>
{% endblock %}
